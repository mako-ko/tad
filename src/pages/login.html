<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tad - sistema gerenciador de tarefas</title>
    <link href="img/tad-icon.svg" rel="icon" />

    <!-- Google Fonts, Playfair Display para títulos e Inter para corpo do texto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="https://mako-ko.github.io/tad/src/css/styles.css">
</head>

<body>
    <!-- Barra de Navegação -->
    <a class="skip-line" href="#conteudo-principal">Pular para o conteúdo principal.</a>
    <header class="header">
        <!-- Logo -->
        <a class="logo" href="index.html">
            <div class="logo-icon">
                <img loading="lazy" src="img/tad-logo.svg" alt="tad, sistema gerenciador de tarefas">
            </div>
        </a>
        <!-- Menu de Navegação -->
        <nav class="nav">
            <ul>
                <li><a href="pages/about.html">Sobre</a></li>
            </ul>
        </nav>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="main" id="conteudo-principal" tabindex="-1">
        <section class="section">
            <h2>Crie sua conta</h2>
            <form class="form-signin">
                <p>
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome completo..." required>
                </p>
                <p>
                    <label for="email">Seu e-mail de preferência:</label>
                    <input type="email" id="email" name="email" placeholder="seunome@email.com" required>
                </p>
                <p>
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" placeholder="Sua senha..." required>
                </p>
                <button class="btn-submit" type="submit">Cadastrar</button>
            </form>
            <p>Já tem uma conta? <a href="pages/login.html">Faça login</a></p>
        </section>
    </main>
    <footer id="footer" class="footer">2026. tad - sistema gerenciador de tarefas. <br>
        Marianne L Ferreira. Projeto para o Centro de Educação Profissional - Escola Ténica de Guará.
    </footer>
</body>

</html>
