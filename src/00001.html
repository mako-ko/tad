<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tad - sistema gerenciador de tarefas</title>
    <link href="./img/tad-icon.svg" rel="icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <a class="skip-line" href="#conteudo-principal"
      >Pular para o conteúdo principal.</a
    >
    <header class="header">
      <a class="logo" href="./dashboard.html">
        <div class="logo-icon">
          <img
            loading="lazy"
            src="./img/icon.svg"
            alt="tad, sistema gerenciador de tarefas"
          />
        </div>
      </a>
      <nav class="nav">
        <ul>
          <li><a href="./dashboard.html">Minhas tarefas</a></li>
          <li><a href="./newtask.html">Criar tarefa</a></li>
          <li><a href="./config.html">Configurações</a></li>
          <li><a href="./index.html">Sair</a></li>
        </ul>
      </nav>
    </header>
    <main class="main" id="conteudo-principal" tabindex="-1">
      <div class="taskboard">
        <div class="task-card-frog">
          <div class="title-task">
            <label for="title">Título da tarefa:</label>
            <h2>Tarefa Prioridade 1</h2>
            <button class="btn-cancel" type="button">Voltar</button>
          </div>
          <form class="task-form">
            <div class="form-details">
              <p>
                <label for="date">Data:</label>
                <input
                  type="datetime"
                  id="date"
                  name="date"
                  placeholder="06/04/2026"
                  required
                />
              </p>
              <p>
                <label for="priority">Prioridade:</label>
                <select id="priority" name="priority">
                  <option value="frog" selected>Sapo</option>
                  <option value="no-frog">Outra</option>
                </select>
              </p>
            </div>
            <p>
              <label for="details">Descrição:</label>
              <textarea name="details" id="details" rows="10" cols="30">
Aqui deve aparecer uma descrição completa do que seria a tarefa prioridade 1. Seguindo o método Eat The Frog, essa seria a maior e mais importante tarefa a ser concluída no seu dia. Assim, deve se usar bons critérios para que ela seja escolhida como tal.</textarea
              >
            </p>
          </form>
          <div class="btn-group">
            <button class="btn-edit" type="button">Editar</button>
            <button class="btn-check" type="button">Concluir</button>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer">
      2026. tad - sistema gerenciador de tarefas. <br />
      Marianne L Ferreira. Projeto para o Centro de Educação Profissional -
      Escola Ténica de Guará.
    </footer>
    <script src="./js/script.js"></script>
  </body>
</html>
