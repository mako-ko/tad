<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tad - sistema gerenciador de tarefas</title>
    <link href="./img/tad-icon.svg" rel="icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <a class="skip-line" href="#conteudo-principal"
      >Pular para o conteúdo principal.</a
    >
    <header class="header">
      <a class="logo" href="./index.html">
        <div class="logo-icon">
          <img
            loading="lazy"
            src="./img/tad-logo.svg"
            alt="tad, sistema gerenciador de tarefas"
          />
        </div>
      </a>
      <nav class="nav">
        <ul>
          <li><a href="./about.html">Sobre o TAD</a></li>
          <li><a href="./signin.html">Criar conta</a></li>
        </ul>
      </nav>
    </header>
    <main class="main" id="conteudo-principal" tabindex="-1">
      <div class="section">
        <h1>Acesse sua conta</h1>
        <form class="form-signin">
          <p>
            <label for="email">E-mail:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seunome@email.com"
              required
            />
          </p>
          <p>
            <label for="senha">Senha:</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Sua senha..."
              required
            />
          </p>
          <button class="btn-submit" type="submit">Entrar</button>
        </form>
        <p>Primeira vez aqui? <a href="./signin.html">Crie uma conta</a></p>
      </div>
    </main>
    <footer class="footer">
      2026. tad - sistema gerenciador de tarefas. <br />
      Marianne L Ferreira. Projeto para o Centro de Educação Profissional -
      Escola Ténica de Guará.
    </footer>
    <script src="./js/script.js"></script>
  </body>
</html>
